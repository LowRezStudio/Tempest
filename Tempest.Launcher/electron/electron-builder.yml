appId: com.lowrezstudio.tempest
productName: Tempest Launcher
electronLanguages:
    - en-US
    - fr
    - es
    - es-419
    - pl
    - ru
directories:
    output: dist
files:
    - build/**/*
    - src/**/*
    - package.json
extraResources:
    - from: resources/binaries
      to: binaries
    - from: ../src-tauri/resources
      to: .
    - from: ../src-tauri/icons/icon.png
      to: icon.png
win:
    target: msi
    icon: ../src-tauri/icons/icon.ico
mac:
    target: dmg
    icon: ../src-tauri/icons/icon.icns
    category: public.app-category.games
linux:
    target:
        - AppImage
        - deb
        - rpm
    icon: ../src-tauri/icons
    category: Game
publish:
    provider: github
    owner: LowRezStudio
    repo: Tempest
