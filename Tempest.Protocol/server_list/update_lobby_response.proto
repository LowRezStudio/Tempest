syntax = "proto3";
package tempest.server_list;
option csharp_namespace = "Tempest.Protocol.ServerList";

import "server_list/update_lobby_success.proto";
import "server_list/update_lobby_error.proto";

message UpdateLobbyResponse {
  oneof result {
    UpdateLobbySuccess success = 1;
    UpdateLobbyError error = 2;
  }
}
