syntax = "proto3";
package tempest.lobby;
option csharp_namespace = "Tempest.Protocol.Lobby";

import "lobby/lobby_player.proto";
import "lobby/lobby_state.proto";
import "lobby/lobby_event_countdown.proto";

message LobbyEventInfo {
  string name = 1;
  LobbyState state = 2;
  repeated LobbyPlayer players = 3;
  uint32 max_players = 4;
  string version = 5;
  bool password_required = 6;
  optional LobbyEventCountdown countdown = 7;
}