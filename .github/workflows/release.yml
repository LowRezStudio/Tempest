name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi
            arch: x64
          - platform: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
            arch: arm64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb,rpm
            arch: x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Zig 0.15.2
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            Tempest.Launcher/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('Tempest.Launcher/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('Tempest.Launcher/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt-get install -y \
            libappindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            patchelf \
            libwebkit2gtk-4.1-0 \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-0 \
            libjavascriptcoregtk-4.1-dev \
            gir1.2-javascriptcoregtk-4.1 \
            gir1.2-webkit2-4.1 \
            libssl-dev \
            pkg-config \
            curl \
            wget \
            file \
            rpm

      - name: Install WiX (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          dotnet tool install --global wix
          wix --version

      - name: Install frontend dependencies
        working-directory: Tempest.Launcher
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: Tempest.Launcher
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          tagName: v__VERSION__
          releaseName: 'Tempest Launcher v__VERSION__'
          releaseDraft: true
          prerelease: false
          releaseBody: 'See the assets to download this version and install.'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tempest-launcher-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            Tempest.Launcher/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            Tempest.Launcher/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi.sig
            Tempest.Launcher/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            Tempest.Launcher/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg.sig
            Tempest.Launcher/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            Tempest.Launcher/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.sig
            Tempest.Launcher/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            Tempest.Launcher/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb.sig
            Tempest.Launcher/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            Tempest.Launcher/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm.sig
          if-no-files-found: warn
